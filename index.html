<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat — BY DYNVALR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: #4B0082; color: white; }

        :root {
            --bg: #f7f7f8; --surface: #fdbcff; --sidebar: #f3a6ff; --card: #c072ff;
            --border: rgba(255,255,255,0.25); --text: #0d0d10; --muted: #2e004d;
            --accent: #b700ff; --user-bg: #ffbbf4; --ai-bg: #ffffff;
            --placeholder: rgba(0, 0, 0, 0.6); --modal-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg: #0d0d12; --surface: #1a1a24; --sidebar: #12121a; --card: #252535;
            --border: rgba(255,255,255,0.08); --text: #ececf1; --muted: #9a9ab0;
            --accent: #bb66ff; --user-bg: #34344a; --ai-bg: #1e1e2e;
            --placeholder: rgba(255, 255, 255, 0.5); --modal-bg: #1e1e2e;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; transition: 0.3s ease; }

        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; transition: 0.3s ease; }
        .sidebar.collapsed { margin-left: -260px; }

        .new-chat-btn { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }

        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }

        .sidebar-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .footer-btn { width: 100%; padding: 10px 12px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }
        .header { display: flex; align-items: center; gap: 12px; padding: 14px 22px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .logo-mark img { width: 32px; height: 32px; }
        .brand { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 28px 20px; }
        .chat-inner { max-width: 740px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }

        .msg-row { display: flex; gap: 13px; max-width: 85%; animation: slideIn 0.2s ease; }
        .msg-row.user { flex-direction: row-reverse; margin-left: auto; }
        .av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--border); background: var(--bg); }
        .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.6; word-break: break-word; }
        .msg-row.user .bubble { background: var(--user-bg); border-radius: 16px 16px 4px 16px; }
        .msg-row.ai .bubble { background: var(--ai-bg); border-radius: 16px 16px 16px 4px; }

        /* Handle code blocks formatting nicely */
        .bubble pre { margin: 10px 0; padding: 12px; border-radius: 8px; overflow-x: auto; background: #1a1a24 !important; }
        .bubble code { font-family: monospace; font-size: 13px; }

        /* LOADING ANIMATION */
        .typing { font-style: italic; opacity: 0.7; font-size: 13px; display: flex; align-items: center; gap: 5px; height: 24px; }
        .typing span { width: 5px; height: 5px; background: var(--text); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }

        .input-area { padding: 14px 20px 18px; background: var(--surface); }
        .input-box { max-width: 740px; margin: 0 auto; display: flex; background: var(--card); border-radius: 14px; padding: 10px 14px; border: 1px solid var(--border); align-items: center; }
        textarea { flex: 1; background: none; border: none; color: var(--text); resize: none; outline: none; font-family: inherit; font-size: 14.5px; }
        textarea::placeholder { color: var(--placeholder); }
        .send-btn { background: var(--accent); border: none; border-radius: 10px; cursor: pointer; padding: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    </style>
</head>
<body data-theme="light">
    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="location.reload()"><strong>+</strong> New Chat</button>
        <div class="chat-history"></div>
        <div class="sidebar-footer">
            <button class="footer-btn">About AI</button>
            <button class="footer-btn">Settings</button>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <div class="logo-mark"><img src="logo.png" onerror="this.style.display='none'"></div>
            <span class="brand">NeuraChat <small>by DYNVALR</small></span>
        </div>

        <div class="chat-scroll" id="chatScroll"><div class="chat-inner" id="chatInner"></div></div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="msgInput" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
                <button class="send-btn" onclick="send()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
            <p style="text-align: center; font-size: 11px; margin-top: 8px; color: var(--muted)">© 2026 DYNVALR</p>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let history = [];

        function addMsg(role, text) {
            const row = document.createElement('div');
            row.className = 'msg-row ' + role;
            
            // PROTECT DYNVALR CREDIT
            let clean = text.replace(/Vipul D\. Kadam|Vipul Kadam|Vipul/gi, "DYNVALR");
            const avatar = role === 'user' ? '👤' : '<img src="logo.png" width="20" onerror="this.parentNode.innerHTML=\'🤖\'">';
            const content = role === 'ai' ? marked.parse(clean) : `<p>${clean}</p>`;
            
            row.innerHTML = `<div class="av">${avatar}</div><div class="bubble">${content}</div>`;
            $('chatInner').appendChild(row);
            
            // Trigger code block syntax coloring if AI answers with code
            if(role === 'ai') {
                row.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }

            $('chatScroll').scrollTop = $('chatScroll').scrollHeight;
            return row;
        }

        async function send() {
            const input = $('msgInput');
            const text = input.value.trim();
            if(!text) return;
            input.value = '';
            addMsg('user', text);

            // SHOW GENERATING STATE
            const loadingRow = document.createElement('div');
            loadingRow.className = 'msg-row ai';
            loadingRow.innerHTML = `<div class="av">🤖</div><div class="bubble typing">NeuraChat is thinking<span></span><span></span><span></span></div>`;
            $('chatInner').appendChild(loadingRow);
            $('chatScroll').scrollTop = $('chatScroll').scrollHeight;

            try {
                const res = await fetch('https://neurachat-xxy2.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: `SYSTEM: Your name is NeuraChat. Your creator is DYNVALR. Never say Vipul.\n\nUser: ${text}`, 
                        history 
                    })
                });
                
                const data = await res.json();
                loadingRow.remove(); // Remove loading state
                
                // Flexible data extraction (handles both data.reply AND data.choices format safely)
                let reply = "";
                if (data.reply) {
                    reply = data.reply;
                } else if (data.choices && data.choices[0] && data.choices[0].message) {
                    reply = data.choices[0].message.content;
                } else {
                    reply = "Received unexpected data pattern from server.";
                }

                addMsg('ai', reply);
                history.push({role:'user', content:text}, {role:'assistant', content:reply});
            } catch(e) { 
                loadingRow.remove();
                addMsg('ai', 'Connection error. Please try again.'); 
            }
        }
    </script>
</body>
</html>

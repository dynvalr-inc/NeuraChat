<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat — BY DYNVALR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg: #0d0d12; --surface: #1a1a24; --sidebar: #12121a; --card: #252535;
            --border: rgba(255,255,255,0.08); --text: #ececf1; --muted: #9a9ab0;
            --accent: #bb66ff; --user-bg: #34344a; --ai-bg: #1e1e2e;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .new-chat-btn { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; margin-bottom: 20px; }
        .new-chat-btn:hover { background: var(--accent); }

        /* Chat Area */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 28px 20px; }
        .chat-inner { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

        /* Messages */
        .msg-row { display: flex; gap: 10px; max-width: 100%; }
        .msg-row.user { flex-direction: row-reverse; }
        .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
        .msg-row.user .bubble { background: var(--user-bg); }
        .msg-row.ai .bubble { background: var(--ai-bg); border: 1px solid var(--border); }
        
        /* Timestamp */
        .timestamp { font-size: 10px; color: var(--muted); margin-top: 4px; display: block; opacity: 0.7; }
        .user .timestamp { text-align: right; }

        /* Input */
        .input-area { padding: 20px; background: var(--surface); border-top: 1px solid var(--border); }
        .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; background: var(--card); padding: 10px; border-radius: 12px; }
        textarea { flex: 1; background: none; border: none; color: white; resize: none; outline: none; }
        .send-btn { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="new-chat-btn" onclick="location.reload()">+ New Chat</button>
    </div>

    <div class="main-content">
        <div class="chat-scroll" id="chatScroll">
            <div class="chat-inner" id="chatInner"></div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="msgInput" placeholder="Type a message..." rows="1"></textarea>
                <button class="send-btn" onclick="send()">Send</button>
            </div>
        </div>
    </div>

    <script>
        function addMsg(role, text) {
            const now = new Date().toLocaleString(); // Date + Time
            const row = document.createElement('div');
            row.className = 'msg-row ' + role;
            
            row.innerHTML = `
                <div class="msg-body">
                    <div class="bubble">${marked.parse(text)}</div>
                    <span class="timestamp">${now}</span>
                </div>
            `;
            
            document.getElementById('chatInner').appendChild(row);
            document.getElementById('chatScroll').scrollTop = document.getElementById('chatScroll').scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;
            
            addMsg('user', text);
            input.value = '';

            try {
                const res = await fetch('https://neurachat-xxy2.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userMessage: text })
                });
                const data = await res.json();
                addMsg('ai', data.reply || data.response || "No response.");
            } catch(e) {
                addMsg('ai', "❌ Connection Error");
            }
        }
    </script>
</body>
</html>

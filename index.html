<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuraChat — OpenRouter AI</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
::selection { background: #4B0082; color: white; }

:root {
  --bg:        #f7f7f8;
  --surface:  #fdbcff;
  --sidebar:  #f3a6ff;
  --card:     #c072ff;
  --border:    rgba(255,255,255,0.15);
  --text:     #0d0d10;
  --muted:     #2e004d;
  --accent:    #b700ff;
  --user-bg:  #ffbbf4;
  --ai-bg:    #ffffff;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR (WITH TOGGLE LOGIC) ── */
.sidebar {
  width: 260px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 15px;
  flex-shrink: 0;
  transition: margin-left 0.3s ease; /* Smooth slide effect */
}

/* Class to hide sidebar */
.sidebar.collapsed {
  margin-left: -260px;
}

.new-chat-btn {
  width: 100%;
  padding: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
  transition: all 0.2s;
}

.new-chat-btn:hover { background: var(--accent); color: white; }

.chat-list-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
  font-weight: 700;
}

.chat-history {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.history-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.2s;
  position: relative;
}

.history-item:hover { background: rgba(255,255,255,0.3); }

.delete-btn {
  opacity: 0;
  background: none;
  border: none;
  color: #8b0000;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  padding: 0 5px;
  transition: opacity 0.2s;
}

.history-item:hover .delete-btn { opacity: 1; }

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100%;
  min-width: 0; /* Prevents overflow when sidebar is open */
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

/* NEW MENU BUTTON STYLE */
.menu-btn {
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 5px;
  border-radius: 6px;
  transition: background 0.2s;
}

.menu-btn:hover { background: rgba(0, 0, 0, 0.05); }
.menu-btn svg { fill: var(--muted); }

.logo-mark img { width: 32px; height: 32px; object-fit: contain; }

.brand { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; }
.brand span { color: var(--accent); }

.chat-scroll { flex: 1; overflow-y: auto; padding: 28px 20px; }
.chat-inner { max-width: 740px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }

/* ── INPUT AREA ── */
.input-area { padding: 14px 20px 18px; background: var(--surface); }
.input-box {
  max-width: 740px; 
  margin: 0 auto;
  display: flex; 
  align-items: flex-end; 
  gap: 10px;
  background: var(--card); 
  border-radius: 14px; 
  padding: 10px 14px;
}
.input-box textarea {
  flex: 1; 
  background: none; 
  border: none; 
  color: #2e004d;
  font-family: 'Inter', sans-serif; 
  font-size: 14px; 
  font-weight: 500;
  resize: none; 
  outline: none; 
  max-height: 200px; 
  min-height: 20px;
  line-height: 1.5;
  overflow-y: hidden;
}
.input-box textarea::placeholder { color: #3b0063; opacity: 0.7; }

.send-btn {
  width: 38px; height: 38px; background: var(--accent);
  border: none; border-radius: 12px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* ── MESSAGES ── */
.msg-row { display: flex; gap: 13px; animation: slideIn 0.22s ease; }
.msg-row.user { flex-direction: row-reverse; }
.av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.av.ai { background: white; border: 1px solid var(--border); }
.av.ai img { width: 70%; height: 70%; object-fit: contain; }
.av.user { background: var(--card); font-size: 18px; }
.bubble { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.6; word-wrap: break-word; }
.msg-row.user .bubble { background: var(--user-bg); border-radius: 16px 16px 4px 16px; }
.msg-row.ai .bubble { background: var(--ai-bg); border-radius: 16px 16px 16px 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: #1a1a1a; }

@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <button class="new-chat-btn" onclick="createNewChat()">
    <strong>+</strong> New Chat
  </button>
  <div class="chat-list-title">Recent History</div>
  <div class="chat-history" id="chatHistory"></div>
</div>

<div class="main-content">
  <div class="header">
    <button class="menu-btn" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
    </button>
    <div class="logo-mark"><img src="logo.png" alt="N"></div>
    <span class="brand">Neura<span>Chat</span></span>
  </div>

  <div class="chat-scroll" id="chatScroll">
    <div class="chat-inner" id="chatInner"></div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea id="msgInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize()"></textarea>
      <button class="send-btn" onclick="send()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      </button>
    </div>
    <div style="font-size: 10px; text-align: center; margin-top: 8px; color: var(--muted)">By DYNVALR</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let history = [];
let busy = false;
let allChats = JSON.parse(localStorage.getItem('neurachat_history')) || [];

function toggleSidebar() {
  $('sidebar').classList.toggle('collapsed');
}

function autoResize() {
  const textarea = $('msgInput');
  textarea.style.height = 'auto';
  textarea.style.height = textarea.scrollHeight + 'px';
  textarea.style.overflowY = textarea.scrollHeight > 200 ? 'auto' : 'hidden';
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

function saveToLocalStorage() { localStorage.setItem('neurachat_history', JSON.stringify(allChats)); }

function createNewChat() {
  if (history.length > 0) {
    const title = history[0].content.substring(0, 30) + "...";
    if (allChats.length === 0 || JSON.stringify(allChats[0].data) !== JSON.stringify(history)) {
      allChats.unshift({ title: title, data: [...history] });
      saveToLocalStorage();
      updateSidebar();
    }
  }
  history = []; 
  $('chatInner').innerHTML = `<div class="welcome"><img src="logo.png" class="welcome-logo" alt="NeuraChat"><h2>Welcome to <em>NeuraChat</em></h2><p>Your session is ready. Ask me anything.</p></div>`;
}

function updateSidebar() {
  const container = $('chatHistory');
  container.innerHTML = '';
  allChats.forEach((chat, index) => {
    const item = document.createElement('div');
    item.className = 'history-item';
    const titleText = document.createElement('span');
    titleText.textContent = chat.title;
    titleText.style.flex = "1";
    titleText.style.overflow = "hidden";
    titleText.style.textOverflow = "ellipsis";
    titleText.onclick = () => loadChat(index);
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.innerHTML = '×';
    delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(index); };
    item.appendChild(titleText);
    item.appendChild(delBtn);
    container.appendChild(item);
  });
}

function deleteChat(index) {
  if (confirm("Delete this conversation?")) {
    allChats.splice(index, 1);
    saveToLocalStorage();
    updateSidebar();
  }
}

function loadChat(index) {
  const chat = allChats[index];
  history = [...chat.data];
  $('chatInner').innerHTML = '';
  history.forEach(msg => addMsg(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
}

function addMsg(role, text, scroll = true) {
  const w = document.querySelector('.welcome'); if (w) w.remove();
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const avatarHtml = role === 'user' ? `<div class="av user">😊</div>` : `<div class="av ai"><img src="logo.png"></div>`;
  const content = role === 'ai' ? marked.parse(text) : `<p>${text}</p>`;
  row.innerHTML = `${avatarHtml}<div class="bubble">${content}</div>`;
  $('chatInner').appendChild(row);
  if (scroll) $('chatScroll').scrollTop = $('chatScroll').scrollHeight;
}

async function send() {
  if (busy) return;
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto'; // Resets height after sending
  busy = true;
  addMsg('user', text);
  try {
    const res = await fetch('https://neurachat-xxy2.onrender.com/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'google/gemini-2.0-flash-lite-001', message: text, history: history })
    });
    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Service unavailable.';
    addMsg('ai', reply);
    history.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
  } catch (err) { addMsg('ai', 'Connection error.'); } finally { busy = false; }
}

updateSidebar();
createNewChat();
</script>
</body>
</html>

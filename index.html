<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuraChat — OpenRouter AI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0a0a0b;
  --surface:  #111114;
  --card:     #18181d;
  --border:   rgba(255,255,255,0.08);
  --border2:  rgba(255,255,255,0.14);
  --text:     #eeedf0;
  --muted:    #72717a;
  --accent:   #e8ff47;
  --accent-d: #b8cc20;
  --user-bg:  #1a1f10;
  --ai-bg:    #111114;
  --code-bg:  #0d0d10;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 22px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.logo-mark {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-mark svg { width: 18px; height: 18px; }

.brand {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--text);
}

.brand span { color: var(--accent); }

.powered {
  margin-left: auto;
  font-size: 11px;
  color: var(--muted);
  background: var(--card);
  border: 1px solid var(--border2);
  padding: 4px 10px;
  border-radius: 20px;
}

.online-dot {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: blink 2.5s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── SETUP BAR ── */
.setup-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.setup-bar label {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.setup-bar input[type="password"],
.setup-bar select {
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Inter', monospace;
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s;
}

.setup-bar input[type="password"] { flex: 1; min-width: 160px; }
.setup-bar select { min-width: 180px; cursor: pointer; }
.setup-bar input:focus,
.setup-bar select:focus { border-color: var(--accent); }

.save-btn {
  background: var(--accent);
  color: #0a0a0b;
  border: none;
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'Syne', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s, transform 0.1s;
}

.save-btn:hover { background: var(--accent-d); }
.save-btn:active { transform: scale(0.97); }

.key-badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  white-space: nowrap;
  display: none;
}

.key-badge.ok  { background: rgba(232,255,71,0.1);  color: var(--accent); border: 1px solid rgba(232,255,71,0.2); }
.key-badge.err { background: rgba(255,80,80,0.1);   color: #ff6060;       border: 1px solid rgba(255,80,80,0.2); }

.clear-btn {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: color 0.2s, border-color 0.2s;
  white-space: nowrap;
}

.clear-btn:hover { color: var(--text); border-color: var(--border2); }

/* ── SYSTEM PROMPT ── */
.sys-bar { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }

.sys-toggle {
  padding: 8px 22px;
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Syne', sans-serif;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  user-select: none;
  transition: color 0.2s;
}

.sys-toggle:hover { color: var(--accent); }

.sys-body { display: none; padding: 0 22px 12px; }
.sys-body.open { display: block; }

.sys-body textarea {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  outline: none;
  resize: vertical;
  min-height: 56px;
  line-height: 1.6;
}

.sys-body textarea:focus { border-color: var(--accent); }

/* ── CHAT ── */
.chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 28px 20px;
  scroll-behavior: smooth;
}

.chat-scroll::-webkit-scrollbar { width: 3px; }
.chat-scroll::-webkit-scrollbar-thumb { background: var(--card); border-radius: 4px; }

.chat-inner {
  max-width: 740px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

/* ── WELCOME ── */
.welcome {
  text-align: center;
  padding: 60px 20px 40px;
}

.welcome-glyph {
  font-size: 48px;
  margin-bottom: 18px;
  display: block;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.welcome h2 {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.5px;
}

.welcome h2 em { color: var(--accent); font-style: normal; }

.welcome p {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 420px;
  margin: 0 auto 24px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.chip {
  background: var(--card);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 24px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
}

.chip:hover { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.04); }

/* ── MESSAGES ── */
.msg-row {
  display: flex;
  gap: 13px;
  animation: slideIn 0.22s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-row.user { flex-direction: row-reverse; }

.av {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-top: 2px;
}

.av.ai   { background: var(--accent); color: #0a0a0b; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; }
.av.user { background: var(--card); border: 1px solid var(--border2); }

.bubble {
  max-width: calc(100% - 54px);
  padding: 13px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.75;
  border: 1px solid var(--border);
}

.msg-row.user .bubble {
  background: var(--user-bg);
  border-color: rgba(232,255,71,0.12);
  border-radius: 16px 4px 16px 16px;
}

.msg-row.ai .bubble {
  background: var(--ai-bg);
  border-color: var(--border);
  border-radius: 4px 16px 16px 16px;
}

.bubble code {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  background: var(--code-bg);
  color: var(--accent);
  padding: 2px 6px;
  border-radius: 4px;
}

.bubble pre {
  background: var(--code-bg);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 14px 16px;
  overflow-x: auto;
  margin: 10px 0;
  font-family: 'Courier New', monospace;
  font-size: 12.5px;
  line-height: 1.65;
}

.bubble pre code { background: none; padding: 0; color: #c8ffa0; }
.bubble p + p { margin-top: 8px; }
.bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
.bubble li { margin: 4px 0; }
.bubble strong { color: var(--accent); font-weight: 500; }
.bubble h1,.bubble h2,.bubble h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; margin: 12px 0 4px; color: var(--accent); }

/* ── TYPING ── */
.typing-dots { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }

.typing-dots span {
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: pop 1.3s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.18s; }
.typing-dots span:nth-child(3) { animation-delay: 0.36s; }

@keyframes pop {
  0%,60%,100% { transform: scale(0.7); opacity: 0.4; }
  30%          { transform: scale(1.2); opacity: 1; }
}

/* ── INPUT ── */
.input-area {
  padding: 14px 20px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.input-box {
  max-width: 740px;
  margin: 0 auto;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 10px 14px;
  transition: border-color 0.2s;
}

.input-box:focus-within { border-color: var(--accent); }

.input-box textarea {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.55;
  resize: none;
  outline: none;
  max-height: 160px;
  overflow-y: auto;
}

.input-box textarea::placeholder { color: var(--muted); }

.send-btn {
  width: 36px; height: 36px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.1s;
}

.send-btn:hover:not(:disabled) { background: var(--accent-d); }
.send-btn:active:not(:disabled) { transform: scale(0.94); }
.send-btn:disabled { opacity: 0.28; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; fill: #0a0a0b; }

.footer-note {
  max-width: 740px;
  margin: 7px auto 0;
  font-size: 11px;
  color: var(--muted);
  text-align: center;
}

.footer-note a { color: var(--accent); text-decoration: none; }
.footer-note a:hover { text-decoration: underline; }

.err-bubble {
  background: rgba(255,80,80,0.08);
  border: 1px solid rgba(255,80,80,0.2);
  color: #ff7070;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
}

@media (max-width: 520px) {
  .setup-bar { padding: 10px 14px; }
  .powered { display: none; }
  .chat-scroll { padding: 18px 12px; }
  .input-area { padding: 10px 12px 14px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo-mark">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="9" cy="9" r="3.5" fill="#0a0a0b"/>
      <circle cx="9" cy="2" r="1.5" fill="#0a0a0b"/>
      <circle cx="9" cy="16" r="1.5" fill="#0a0a0b"/>
      <circle cx="2" cy="9" r="1.5" fill="#0a0a0b"/>
      <circle cx="16" cy="9" r="1.5" fill="#0a0a0b"/>
      <line x1="9" y1="3.5" x2="9" y2="5.5" stroke="#0a0a0b" stroke-width="1.5"/>
      <line x1="9" y1="12.5" x2="9" y2="14.5" stroke="#0a0a0b" stroke-width="1.5"/>
      <line x1="3.5" y1="9" x2="5.5" y2="9" stroke="#0a0a0b" stroke-width="1.5"/>
      <line x1="12.5" y1="9" x2="14.5" y2="9" stroke="#0a0a0b" stroke-width="1.5"/>
    </svg>
  </div>
  <span class="brand">Neura<span>Chat</span></span>
  <span class="powered">via OpenRouter</span>
  <div class="online-dot"></div>
</div>

<!-- SETUP BAR -->
<div class="setup-bar">
  
  <label>Model</label>
  <select id="modelSelect">
    <optgroup label="⚡ Auto Free (Recommended)">
      <option value="openrouter/free">Auto — Best Available Free Model</option>
    </optgroup>
    <optgroup label="Free Models">
      <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (Free)</option>
      <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Free)</option>
      <option value="deepseek/deepseek-r1:free">DeepSeek R1 (Free)</option>
      <option value="deepseek/deepseek-v3-base:free">DeepSeek V3 (Free)</option>
      <option value="google/gemma-3-12b-it:free">Gemma 3 12B (Free)</option>
      <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (Free)</option>
      <option value="qwen/qwen3-235b-a22b:free">Qwen3 235B (Free)</option>
    </optgroup>
    <optgroup label="Paid Models">
      <option value="openai/gpt-4o">GPT-4o</option>
      <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
      <option value="anthropic/claude-sonnet-4-5">Claude Sonnet</option>
      <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash</option>
    </optgroup>
  </select>
  
  <button class="clear-btn" onclick="clearChat()">Clear chat</button>
</div>

<!-- SYSTEM PROMPT -->
<div class="sys-bar">
  <div class="sys-toggle" onclick="toggleSys()">
    <span id="sysArrow">▶</span> System prompt
  </div>
  <div class="sys-body" id="sysBody">
    <textarea id="sysPrompt" rows="2" placeholder="You are a helpful assistant...">You are a helpful, friendly, and concise AI assistant.</textarea>
  </div>
</div>

<!-- CHAT -->
<div class="chat-scroll" id="chatScroll">
  <div class="chat-inner" id="chatInner">
    <div class="welcome" id="welcome">
      <span class="welcome-glyph">🤖</span>
      <h2>Welcome to <em>NeuraChat</em></h2>
      <p>Powered by OpenRouter — access dozens of AI models with one API key. Free models available!</p>
      <div class="chips">
        <button class="chip" onclick="chip(this)">What can you do?</button>
        <button class="chip" onclick="chip(this)">Write me a poem</button>
        <button class="chip" onclick="chip(this)">Explain black holes simply</button>
        <button class="chip" onclick="chip(this)">Give me a fun fact</button>
        <button class="chip" onclick="chip(this)">Help me write code</button>
      </div>
    </div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-box">
    <textarea id="msgInput" placeholder="Type a message… (Enter to send, Shift+Enter for new line)"
      rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()" disabled title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-note">
    Your API key is stored in your browser only &nbsp;·&nbsp;
    <a href="https://openrouter.ai/keys" target="_blank">Get a free OpenRouter key →</a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let history = [];
let apiKey = localStorage.getItem('or_key') || '';
let busy = false;

function saveKey() {
  const v = $('apiKey').value.trim();
  if (!v) return;
  apiKey = v;
  localStorage.setItem('or_key', v);
  badge(true);
  $('sendBtn').disabled = false;
  $('msgInput').focus();
}

function badge(ok, msg) {
  const el = $('keyBadge');
  el.style.display = 'inline-block';
  el.className = 'key-badge ' + (ok ? 'ok' : 'err');
  el.textContent = msg || (ok ? '✓ Connected' : '✗ Invalid key');
}

function toggleSys() {
  const open = $('sysBody').classList.toggle('open');
  $('sysArrow').textContent = open ? '▼' : '▶';
}

function chip(btn) {
  $('msgInput').value = btn.textContent;
  autoResize($('msgInput'));
  send();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function clearChat() {
  history = [];
  $('chatInner').innerHTML = `
    <div class="welcome" id="welcome">
      <span class="welcome-glyph">🤖</span>
      <h2>Welcome to <em>NeuraChat</em></h2>
      <p>Chat cleared. Start a new conversation!</p>
      <div class="chips">
        <button class="chip" onclick="chip(this)">What can you do?</button>
        <button class="chip" onclick="chip(this)">Write me a poem</button>
        <button class="chip" onclick="chip(this)">Explain black holes simply</button>
        <button class="chip" onclick="chip(this)">Give me a fun fact</button>
      </div>
    </div>`;
}

function addMsg(role, text) {
  const w = $('welcome');
  if (w) w.remove();

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  row.innerHTML = `
    <div class="av ${role}">${role === 'user' ? '😊' : 'N'}</div>
    <div class="bubble">${md(text)}</div>
  `;
  $('chatInner').appendChild(row);
  scroll();
}

function addTyping() {
  const w = $('welcome'); if (w) w.remove();
  const row = document.createElement('div');
  row.className = 'msg-row ai'; row.id = 'typing';
  row.innerHTML = `
    <div class="av ai">N</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  $('chatInner').appendChild(row);
  scroll();
}

function scroll() {
  const s = $('chatScroll');
  setTimeout(() => s.scrollTop = s.scrollHeight, 60);
}

function md(t) {
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c) => `<pre><code>${esc(c.trim())}</code></pre>`);
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.*?)\*/g, '<em>$1</em>');
  t = t.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
  t = t.replace(/^[-*] (.+)/gm, '<li>$1</li>').replace(/(<li>[\s\S]*?<\/li>)+/g, '<ul>$&</ul>');
  t = t.replace(/^\d+\. (.+)/gm, '<li>$1</li>');
  t = t.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  if (busy) return;
  const input = $('msgInput');
  const text = input.value.trim();
  if (!text) return;

  // We no longer check for apiKey here because the server has it!
  input.value = ''; 
  input.style.height = 'auto';
  busy = true; 
  $('sendBtn').disabled = true;

  history.push({ role: 'user', content: text });
  addMsg('user', text);
  addTyping();

  const sys = $('sysPrompt').value.trim();
  const model = $('modelSelect').value;

  try {
    // We send the request to your LOCAL server
    const res = await fetch('https://neurachat-xxy2.onrender.com/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ 
        model: model, 
        message: text,
        systemPrompt: sys,
        history: history 
      })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || '(no response)';
    
    history.push({ role: 'assistant', content: reply });
    document.getElementById('typing')?.remove();
    addMsg('ai', reply);

  } catch (err) {
    document.getElementById('typing')?.remove();
    // Error handling code here...
  } finally {
    busy = false;
    $('sendBtn').disabled = false;
    $('msgInput').focus();
  }
}
</script>
</body>
</html>

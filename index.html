<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat — BY DYNVALR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: #4B0082; color: white; }

        :root {
            --bg: #f7f7f8; --surface: #fdbcff; --sidebar: #f3a6ff; --card: #c072ff;
            --border: rgba(255,255,255,0.25); --text: #0d0d10; --muted: #2e004d;
            --accent: #b700ff; --user-bg: #ffbbf4; --ai-bg: #ffffff;
            --placeholder: rgba(255, 255, 255, 0.9); --modal-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg: #0d0d12; --surface: #1a1a24; --sidebar: #12121a; --card: #252535;
            --border: rgba(255,255,255,0.08); --text: #ececf1; --muted: #9a9ab0;
            --accent: #bb66ff; --user-bg: #34344a; --ai-bg: #1e1e2e;
            --placeholder: rgba(255, 255, 255, 0.5); --modal-bg: #1e1e2e;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; overflow: hidden; transition: 0.3s ease; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; flex-shrink: 0; transition: 0.3s ease; }
        .sidebar.collapsed { margin-left: -260px; }

        .new-chat-btn { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; transition: background 0.2s; }
        .new-chat-btn:hover { background: var(--accent); color: white; }

        .chat-list-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; font-weight: 700; }
        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        
        /* SAVED CHAT ITEM LINKS */
        .chat-history-item { padding: 10px; background: rgba(255,255,255,0.1); border: 1px solid transparent; border-radius: 8px; color: var(--text); font-size: 13.5px; cursor: pointer; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; transition: 0.2s; text-align: left; }
        .chat-history-item:hover { background: var(--card); border-color: var(--border); }
        .chat-history-item.active { background: var(--accent); color: white; }

        .sidebar-footer { margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .footer-btn { width: 100%; padding: 10px 12px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .footer-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }

        /* MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal { background: var(--modal-bg); padding: 25px; border-radius: 16px; width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid var(--border); transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-family: 'Syne', sans-serif; }
        .close-modal { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text); }

        /* MAIN CONTENT */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }
        .header { display: flex; align-items: center; gap: 12px; padding: 14px 22px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .menu-toggle { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .logo-mark img { width: 32px; height: 32px; object-fit: contain; }
        .brand { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; }
        .brand span { color: var(--accent); }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 28px 20px; }
        .chat-inner { max-width: 740px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }

        /* WELCOME SPLASH & IDLE FLOATING LOGO */
        .welcome { text-align: center; padding: 60px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: auto; }
        .welcome-logo-container { position: relative; margin-bottom: 25px; display: inline-block; animation: floatAnimation 3s ease-in-out infinite; }
        .welcome img { width: 140px; height: auto; display: block; filter: drop-shadow(0 8px 16px rgba(183, 0, 255, 0.15)); }

        @keyframes floatAnimation {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); filter: drop-shadow(0 15px 24px rgba(183, 0, 255, 0.3)); }
            100% { transform: translateY(0px); }
        }

        /* MESSAGES */
        .msg-row { display: flex; gap: 13px; max-width: 85%; animation: slideIn 0.2s ease; }
        .msg-row.user { flex-direction: row-reverse; margin-left: auto; }
        .av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--border); overflow: hidden; background: var(--ai-bg); }
        .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.6; color: var(--text); word-break: break-word; }
        .msg-row.user .bubble { background: var(--user-bg); border-radius: 16px 16px 4px 16px; }
        .msg-row.ai .bubble { background: var(--ai-bg); border-radius: 16px 16px 16px 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* CODE BLOCK MARKDOWN SETUP & COPY BUTTON */
        pre { background: #1a1a24 !important; padding: 14px; border-radius: 8px; overflow-x: auto; margin: 12px 0; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        code { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
        
        .code-copy-btn { position: absolute; top: 6px; right: 6px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 5px; color: #ececf1; font-size:

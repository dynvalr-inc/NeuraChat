<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat</title>
    <style>
        /* CSS Reset & Dark Mode Theme */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #1a1a24; color: #ececf1; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background-color: #12121a; padding: 20px; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .new-chat-btn { background: #6b21a8; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .new-chat-btn:hover { background: #7e22ce; }

        /* Main Chat Area */
        .main-chat { flex: 1; display: flex; flex-direction: column; }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Messages */
        .msg-row { display: flex; flex-direction: column; max-width: 80%; }
        .msg-row.user { align-self: flex-end; align-items: flex-end; }
        .msg-row.ai { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 12px 16px; border-radius: 12px; background: #34344a; line-height: 1.5; }
        .user .bubble { background: #6b21a8; }
        .timestamp { font-size: 10px; color: #888; margin-top: 4px; }

        /* Input Area */
        .input-area { padding: 20px; background: #1a1a24; border-top: 1px solid #333; display: flex; gap: 10px; }
        textarea { flex: 1; background: #252535; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; resize: none; height: 50px; }
        button#send { background: #6b21a8; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="sidebar">
        <button class="new-chat-btn" onclick="location.reload()">+ New Chat</button>
        <div id="history"></div>
    </div>

    <div class="main-chat">
        <div class="chat-scroll" id="chatContainer">
            <div class="msg-row ai"><div class="bubble">Hello! How can I help you today?</div></div>
        </div>
        <div class="input-area">
            <textarea id="msgInput" placeholder="Type a message..."></textarea>
            <button id="send" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function addMessage(role, text) {
            const container = document.getElementById('chatContainer');
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;
            
            // Generate Current Date and Time
            const now = new Date();
            const timeString = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            row.innerHTML = `
                <div class="bubble">${text}</div>
                <div class="timestamp">${timeString}</div>
            `;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage('user', text);
            input.value = '';

            try {
                // IMPORTANT: Replace this URL with your actual backend URL
                const response = await fetch('https://neurachat-xxy2.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userMessage: text })
                });

                const data = await response.json();
                const reply = data.reply || data.response || "No response received.";
                addMessage('ai', reply);

            } catch (error) {
                addMessage('ai', "Error: Could not connect to server. Check your Render logs.");
                console.error(error);
            }
        }
    </script>
</body>
</html>

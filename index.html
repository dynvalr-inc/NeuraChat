<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat — BY DYNVALR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f7f7f8; --surface: #fdbcff; --sidebar: #f3a6ff; --card: #c072ff;
            --border: rgba(255,255,255,0.25); --text: #0d0d10; --muted: #2e004d;
            --accent: #b700ff; --user-bg: #ffbbf4; --ai-bg: #ffffff;
            --placeholder: rgba(255, 255, 255, 0.9); --modal-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg: #0d0d12; --surface: #1a1a24; --sidebar: #12121a; --card: #252535;
            --border: rgba(255,255,255,0.08); --text: #ececf1; --muted: #9a9ab0;
            --accent: #bb66ff; --user-bg: #34344a; --ai-bg: #1e1e2e;
            --placeholder: rgba(255, 255, 255, 0.5); --modal-bg: #1e1e2e;
        }

        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            height: 100dvh; display: flex; overflow: hidden; transition: background 0.3s ease;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px; flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .sidebar.collapsed { margin-left: -260px; }

        .new-chat-btn {
            width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif;
            font-weight: 600; cursor: pointer; margin-bottom: 20px;
        }

        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
        }

        /* FOOTER FIX */
        .sidebar-footer {
            margin-top: auto; padding-top: 15px; border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 8px;
        }
        .footer-btn {
            width: 100%; padding: 10px 12px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--border); border-radius: 8px; color: var(--text);
            font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* MODALS */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; align-items: center; 
            justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal {
            background: var(--modal-bg); padding: 25px; border-radius: 16px; width: 340px;
            transform: scale(0.8); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.active .modal { transform: scale(1); }

        /* MESSAGES & CONTENT */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }
        .header { display: flex; align-items: center; gap: 12px; padding: 14px 22px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 28px 20px; }
        .chat-inner { max-width: 740px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }
        .msg-row { display: flex; gap: 13px; max-width: 85%; }
        .msg-row.user { flex-direction: row-reverse; margin-left: auto; }
        .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.6; background: var(--ai-bg); }
        .msg-row.user .bubble { background: var(--user-bg); }
        
        .input-area { padding: 14px 20px 18px; background: var(--surface); }
        .input-box { max-width: 740px; margin: 0 auto; display: flex; background: var(--card); border-radius: 14px; padding: 10px; }
        textarea { flex: 1; background: none; border: none; color: white; outline: none; resize: none; }
    </style>
</head>

<body data-theme="light">
    <div class="modal-overlay" id="settingsModal" onclick="if(event.target==this) closeModal('settingsModal')">
        <div class="modal">
            <h3>Settings</h3>
            <div style="margin: 20px 0; display: flex; justify-content: space-between;">
                <span>Dark Mode</span>
                <button onclick="toggleTheme()" id="themeBtn">🌙 Switch</button>
            </div>
            <button onclick="closeModal('settingsModal')">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="aboutModal" onclick="if(event.target==this) closeModal('aboutModal')">
        <div class="modal">
            <h3>About AI</h3>
            <div style="margin: 20px 0;">
                <p><strong>NeuraChat BY DYNVALR</strong></p>
                <p id="aboutContent">Waiting for creator info...</p>
            </div>
            <button onclick="closeModal('aboutModal')">Close</button>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()">+ New Chat</button>
        <div class="chat-history" id="chatHistory"></div>
        
        <div class="sidebar-footer">
            <button class="footer-btn" onclick="openModal('aboutModal')">About AI</button>
            <button class="footer-btn" onclick="openModal('settingsModal')">Settings</button>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <span class="brand">NeuraChat <small>by DYNVALR</small></span>
        </div>
        <div class="chat-scroll" id="chatScroll">
            <div class="chat-inner" id="chatInner"></div>
        </div>
        <div class="input-area">
            <div class="input-box">
                <textarea id="msgInput" placeholder="Type a message..." rows="1" onkeydown="if(event.key==='Enter') send()"></textarea>
                <button onclick="send()">Send</button>
            </div>
            <p style="text-align: center; font-size: 10px; margin-top: 5px;">© 2026 DYNVALR</p>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let history = [];
        let allChats = JSON.parse(localStorage.getItem('neurachat_history')) || [];

        function openModal(id) { $(id).style.display = 'flex'; setTimeout(() => $(id).classList.add('active'), 10); }
        function closeModal(id) { $(id).classList.remove('active'); setTimeout(() => $(id).style.display = 'none', 300); }

        function toggleTheme() {
            const t = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', t);
            localStorage.setItem('neurachat_theme', t);
        }

        function addMsg(role, text) {
            const row = document.createElement('div');
            row.className = 'msg-row ' + role;
            // Strict replacement to ensure DYNVALR is always credited
            let clean = text.replace(/Vipul D\. Kadam|Vipul Kadam|Vipul/gi, "DYNVALR");
            row.innerHTML = `<div class="bubble">${clean}</div>`;
            $('chatInner').appendChild(row);
            $('chatScroll').scrollTop = $('chatScroll').scrollHeight;
        }

        async function send() {
            const input = $('msgInput');
            const text = input.value.trim();
            if(!text) return;
            input.value = '';
            addMsg('user', text);

            try {
                const res = await fetch('https://neurachat-xxy2.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Your creator is DYNVALR. Never say Vipul.\n\nUser: ${text}`, history })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                addMsg('ai', reply);
                history.push({role:'user', content:text}, {role:'assistant', content:reply});
            } catch(e) { addMsg('ai', 'Error connecting to server.'); }
        }

        function createNewChat() { history = []; $('chatInner').innerHTML = 'Ready for a new chat.'; }
    </script>
</body>
</html>

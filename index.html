<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat — BY DYNVALR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap');
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: #4B0082; color: white; }

        /* THEME VARIABLES */
        :root {
            --bg: #f7f7f8;
            --surface: #fdbcff;
            --sidebar: #f3a6ff;
            --card: #c072ff;
            --border: rgba(255,255,255,0.25);
            --text: #0d0d10;
            --muted: #2e004d;
            --accent: #b700ff;
            --user-bg: #ffbbf4;
            --ai-bg: #ffffff;
            --placeholder: rgba(255, 255, 255, 0.9);
            --modal-bg: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg: #0d0d12;
            --surface: #1a1a24;
            --sidebar: #12121a;
            --card: #252535;
            --border: rgba(255,255,255,0.08);
            --text: #ececf1;
            --muted: #9a9ab0;
            --accent: #bb66ff;
            --user-bg: #34344a;
            --ai-bg: #1e1e2e;
            --placeholder: rgba(255, 255, 255, 0.5);
            --modal-bg: #1e1e2e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px; flex-shrink: 0;
            transition: all 0.3s ease;
        }
        .sidebar.collapsed { margin-left: -260px; }

        .new-chat-btn {
            width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif;
            font-weight: 600; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; margin-bottom: 20px; transition: all 0.2s;
        }
        .new-chat-btn:hover { background: var(--accent); color: white; }

        .chat-list-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; font-weight: 700; }
        .chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }

        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px; border-radius: 6px; font-size: 13px; cursor: pointer;
            color: var(--text); transition: background 0.2s;
        }
        .history-item:hover { background: rgba(255,255,255,0.1); }
        .delete-btn { opacity: 0; background: none; border: none; color: #ff4d4d; font-weight: bold; font-size: 14px; cursor: pointer; padding: 0 5px; }
        .history-item:hover .delete-btn { opacity: 1; }

        /* SETTINGS BUTTON */
        .settings-btn {
            width: 100%; padding: 12px; background: none; border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); font-size: 14px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; margin-top: auto; transition: background 0.2s;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.1); }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal {
            background: var(--modal-bg); padding: 25px; border-radius: 16px; width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-family: 'Syne', sans-serif; }
        .close-modal { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); }
        
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-top: 1px solid var(--border); }
        .theme-toggle-btn {
            padding: 8px 14px; background: var(--accent); color: white; border: none;
            border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600;
        }

        /* MAIN CONTENT */
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; min-width: 0; }
        .header { display: flex; align-items: center; gap: 12px; padding: 14px 22px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .logo-mark img { width: 32px; height: 32px; object-fit: contain; }
        .brand { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; }
        .brand span { color: var(--accent); }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 28px 20px; }
        .chat-inner { max-width: 740px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }

        /* WELCOME */
        .welcome { text-align: center; padding: 80px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .welcome img { width: 100px; height: auto; margin-bottom: 20px; }
        .welcome h2 { font-family: 'Syne', sans-serif; font-size: 28px; color: var(--text); }

        /* MESSAGES */
        .msg-row { display: flex; gap: 13px; animation: slideIn 0.22s ease; position: relative; width: fit-content; max-width: 85%; }
        .msg-row.user { flex-direction: row-reverse; margin-left: auto; }
        .av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--border); }
        .av.ai { background: white; }
        .av.user { background: var(--card); font-size: 18px; }
        .bubble { padding: 12px 16px; border-radius: 16px; font-size: 14.5px; line-height: 1.6; color: var(--text); }
        .msg-row.user .bubble { background: var(--user-bg); border-radius: 16px 16px 4px 16px; }
        .msg-row.ai .bubble { background: var(--ai-bg); border-radius: 16px 16px 16px 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* INPUT AREA */
        .input-area { padding: 14px 20px 18px; background: var(--surface); }
        .input-box { max-width: 740px; margin: 0 auto; display: flex; align-items: flex-end; gap: 10px; background: var(--card); border-radius: 14px; padding: 10px 14px; border: 1px solid var(--border); }
        .input-box textarea { flex: 1; background: none; border: none; color: white; font-family: 'Inter', sans-serif; font-size: 14px; resize: none; outline: none; }
        .input-box textarea::placeholder { color: var(--placeholder); }
        .send-btn { width: 38px; height: 38px; background: var(--accent); border: none; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>

<body data-theme="light">
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="close-modal" onclick="closeSettings()">×</button>
            </div>
            <div class="setting-row">
                <span>Theme Mode</span>
                <button class="theme-toggle-btn" id="themeBtn" onclick="toggleTheme()">🌙 Dark Mode</button>
            </div>
            <p style="font-size: 10px; color: var(--muted); margin-top: 15px; text-align: center;">NeuraChat v2.0 by DYNVALR</p>
        </div>
    </div>

    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="createNewChat()"><strong>+</strong> New Chat</button>
        <div class="chat-list-title">Recent History</div>
        <div class="chat-history" id="chatHistory"></div>
        
        <button class="settings-btn" onclick="openSettings()">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path></svg>
            Settings
        </button>
    </div>

    <div class="main-content">
        <div class="header">
            <button style="background:none; border:none; cursor:pointer;" onclick="toggleSidebar()">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="var(--muted)"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path></svg>
            </button>
            <div class="logo-mark"><img src="logo.png" alt="N"></div>
            <span class="brand">Neura<span>Chat</span> <small style="font-size:10px; opacity:0.6;">by DYNVALR</small></span>
        </div>

        <div class="chat-scroll" id="chatScroll">
            <div class="chat-inner" id="chatInner"></div>
        </div>

        <div class="input-area">
            <div class="input-box">
                <textarea id="msgInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize()"></textarea>
                <button class="send-btn" onclick="send()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
            <div style="font-size: 11px; text-align: center; margin-top: 8px; color: var(--muted); font-weight: bold;">© 2026 DYNVALR | All Rights Reserved</div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let history = [];
        let busy = false;
        let allChats = JSON.parse(localStorage.getItem('neurachat_history')) || [];

        // MODAL LOGIC
        function openSettings() { $('settingsModal').style.display = 'flex'; }
        function closeSettings() { $('settingsModal').style.display = 'none'; }
        
        // THEME LOGIC
        function toggleTheme() {
            const current = document.body.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', target);
            $('themeBtn').innerHTML = target === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';
            localStorage.setItem('neurachat_theme', target);
        }

        // Init Theme
        const savedTheme = localStorage.getItem('neurachat_theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        $('themeBtn').innerHTML = savedTheme === 'light' ? '🌙 Dark Mode' : '☀️ Light Mode';

        function toggleSidebar() { $('sidebar').classList.toggle('collapsed'); }
        function autoResize() {
            const textarea = $('msgInput');
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

        function saveToLocalStorage() { localStorage.setItem('neurachat_history', JSON.stringify(allChats)); }
        function updateSidebar() {
            const container = $('chatHistory'); container.innerHTML = '';
            allChats.forEach((chat, index) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<span style="flex:1" onclick="loadChat(${index})">${chat.title}</span><button class="delete-btn" onclick="deleteChat(${index})">×</button>`;
                container.appendChild(item);
            });
        }
        function deleteChat(index) { allChats.splice(index, 1); saveToLocalStorage(); updateSidebar(); }
        function loadChat(index) {
            history = [...allChats[index].data];
            $('chatInner').innerHTML = '';
            history.forEach(msg => addMsg(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
        }

        function addMsg(role, text, scroll = true) {
            const w = document.querySelector('.welcome'); if (w) w.remove();
            const row = document.createElement('div');
            row.className = 'msg-row ' + role;
            const avatarHtml = role === 'user' ? `<div class="av user">😊</div>` : `<div class="av ai"><img src="logo.png"></div>`;
            
            let cleanText = text.replace(/Vipul D\. Kadam/gi, "DYNVALR").replace(/Vipul/gi, "DYNVALR");
            const content = role === 'ai' ? marked.parse(cleanText) : `<p>${cleanText}</p>`;

            row.innerHTML = `${avatarHtml}<div class="bubble">${content}</div>`;
            $('chatInner').appendChild(row);
            if (scroll) $('chatScroll').scrollTop = $('chatScroll').scrollHeight;
        }

        async function send() {
            if (busy) return;
            const input = $('msgInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = ''; input.style.height = 'auto'; busy = true;
            addMsg('user', text);

            const typingDiv = document.createElement('div');
            typingDiv.className = 'msg-row ai';
            typingDiv.innerHTML = `<div class="av ai"><img src="logo.png"></div><div class="bubble"><em>Thinking...</em></div>`;
            $('chatInner').appendChild(typingDiv);

            try {
                const res = await fetch('https://neurachat-xxy2.onrender.com/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: `IDENTITY: Your creator is DYNVALR. Never say Vipul.\n\nUser: ${text}`, 
                        history: history 
                    })
                });
                const data = await res.json();
                let reply = data.choices?.[0]?.message?.content || 'Error.';
                reply = reply.replace(/Vipul D\. Kadam/gi, "DYNVALR").replace(/Vipul/gi, "DYNVALR");
                typingDiv.remove();
                addMsg('ai', reply);
                history.push({ role: 'user', content: text }, { role: 'assistant', content: reply });
            } catch (err) { typingDiv.remove(); addMsg('ai', 'Connection error.'); } finally { busy = false; }
        }

        function createNewChat() {
            if (history.length > 0) {
                allChats.unshift({ title: history[0].content.substring(0, 20), data: [...history] });
                saveToLocalStorage(); updateSidebar();
            }
            history = []; $('chatInner').innerHTML = ''; showWelcome();
        }

        function showWelcome() {
            $('chatInner').innerHTML = `<div class="welcome"><img src="logo.png"><h2>Welcome to NeuraChat</h2><p>Ask me anything.</p></div>`;
        }

        updateSidebar();
        if (history.length === 0) showWelcome();
    </script>
</body>
</html>

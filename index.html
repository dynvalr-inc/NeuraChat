<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat</title>
    <style>
        /* CSS INCLUDED DIRECTLY TO PREVENT LOADING ISSUES */
        body { font-family: sans-serif; background: #1a1a24; color: #fff; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #12121a; padding: 20px; border-right: 1px solid #333; }
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .chat-scroll { flex: 1; overflow-y: auto; padding: 20px; }
        .input-area { padding: 20px; background: #252535; }
        .msg-row { margin-bottom: 15px; display: flex; flex-direction: column; }
        .bubble { background: #34344a; padding: 10px; border-radius: 10px; display: inline-block; max-width: 80%; }
        .timestamp { font-size: 10px; color: #888; margin-top: 4px; }
        .user { align-items: flex-end; }
        .ai { align-items: flex-start; }
    </style>
</head>
<body>
    <div class="sidebar">
        <button onclick="location.reload()">+ New Chat</button>
        <div id="history"></div>
    </div>
    <div class="main-content">
        <div class="chat-scroll" id="chatInner"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Type a message..." style="width: 80%;">
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        // Persistence Logic
        let allChats = JSON.parse(localStorage.getItem('neurachat_sessions')) || {};
        let currentId = 'chat_' + Date.now();

        function addMsg(role, text, time) {
            const container = document.getElementById('chatInner');
            const row = document.createElement('div');
            row.className = 'msg-row ' + role;
            row.innerHTML = `<div class="bubble">${text}</div><div class="timestamp">${time}</div>`;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;
            
            const now = new Date().toLocaleString(); // Full Date & Time
            
            // UI Update
            addMsg('user', text, now);
            
            // Save to Local Storage
            if(!allChats[currentId]) allChats[currentId] = [];
            allChats[currentId].push({ role: 'user', text, time: now });
            localStorage.setItem('neurachat_sessions', JSON.stringify(allChats));
            
            input.value = '';

            try {
                const res = await fetch('https://neurachat-xxy2.onrender.com/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ userMessage: text })
                });
                const data = await res.json();
                const reply = data.reply || "Error: No response";
                
                addMsg('ai', reply, new Date().toLocaleString());
                allChats[currentId].push({ role: 'ai', text: reply, time: new Date().toLocaleString() });
                localStorage.setItem('neurachat_sessions', JSON.stringify(allChats));
            } catch(e) {
                addMsg('ai', "Error connecting to server.", new Date().toLocaleString());
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuraChat AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* THEME 1: LIGHT MODE (Readable Dark Slate Muted Text) */
        :root {
            --bg: #f8fafc; --surface: #ffffff; --sidebar: #f1f5f9; --card: #ffffff;
            --border: #e2e8f0; --text: #0f172a; --muted: #64748b;
            --accent: #6366f1; --user-bg: #e0e7ff; --ai-bg: #f1f5f9;
            --placeholder: #94a3b8; --modal-bg: #ffffff;
            --table-hdr: #f1f5f9; --table-zebra: #f8fafc;
        }

        /* THEME 2: DARK FUSION MODE (Readable Light Gray Muted Text) */
        [data-theme="dark"] {
            --bg: #0f172a; --surface: #1e293b; --sidebar: #0f172a; --card: #1e293b;
            --border: #334155; --text: #f8fafc; --muted: #94a3b8;
            --accent: #818cf8; --user-bg: #312e81; --ai-bg: #334155;
            --placeholder: #64748b; --modal-bg: #1e293b;
            --table-hdr: #334155; --table-zebra: #1e293b;
        }

        /* THEME 3: MIDNIGHT BLACK MODE (Readable Silver-Purple Muted Text) */
        [data-theme="midnight"] {
            --bg: #000000; --surface: #0a0a0f; --sidebar: #050508; --card: #12121a;
            --border: rgba(255,255,255,0.12); --text: #f3f3f6; --muted: #a1a1c2;
            --accent: #9d33ff; --user-bg: #1f1f2e; --ai-bg: #0d0d12;
            --placeholder: rgba(255, 255, 255, 0.4); --modal-bg: #0a0a0f;
            --table-hdr: #181824; --table-zebra: rgba(255,255,255,0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; transition: background-color 0.2s, border-color 0.2s; }
        body { display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Layout Structure */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; transition: transform 0.3s ease; }
        .main-chat { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; background: var(--bg); }
        
        /* Top Navigation Bar */
        .top-bar { height: 60px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--surface); }
        .chat-title { font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .top-actions { display: flex; align-items: center; gap: 12px; }
        .icon-btn { background: none; border: none; color: var(--text); cursor: pointer; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .icon-btn:hover { background: rgba(120,120,120,0.15); }
        
        /* History & Sidebar Styling */
        .new-chat-btn { margin: 15px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; }
        .new-chat-btn:hover { background: var(--bg); }
        .history-list { flex: 1; overflow-y: auto; padding: 0 10px; display: flex; flex-direction: column; gap: 4px; }
        .history-item { padding: 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; color: var(--text); text-decoration: none; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .history-item:hover, .history-item.active { background: rgba(120,120,120,0.1); }
        
        /* Settings / Footer Area inside Sidebar */
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
        .theme-select { width: 100%; padding: 8px; border-radius: 6px; background: var(--surface); color: var(--text); border: 1px solid var(--border); font-size: 0.9rem; cursor: pointer; }
        
        /* Message Area */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; }
        .message-row { display: flex; padding: 24px 20px; width: 100%; justify-content: center; border-bottom: 1px solid rgba(120,120,120,0.05); }
        .message-row.user { background: rgba(120,120,120,0.02); }
        .message-center { max-width: 800px; width: 100%; display: flex; gap: 18px; position: relative; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.85rem; flex-shrink: 0; }
        .user .avatar { background: var(--accent); color: white; }
        .ai .avatar { background: radial-gradient(circle, #9d33ff, #6366f1); color: white; }
        
        .message-content { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-x: auto; color: var(--text); font-size: 1rem; line-height: 1.6; }
        
        /* Meta row for timestamp */
        .message-meta { font-size: 0.75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
        
        /* Interactive Buttons Under Message */
        .msg-tools { display: flex; gap: 8px; margin-top: 8px; }
        .tool-btn { background: rgba(120,120,120,0.08); border: none; color: var(--text); font-size: 0.75rem; font-weight: 600; padding: 5px 10px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
        .tool-btn:hover { background: rgba(120,120,120,0.18); }

        /* Text Input Section */
        .input-area { padding: 0 20px 24px 20px; display: flex; justify-content: center; background: linear-gradient(transparent, var(--bg) 20%); }
        .input-wrapper { max-width: 800px; width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; box-shadow: 0 4px 20px rgba(0,0,0,0.03); position: relative; }
        .input-wrapper:focus-within { border-color: var(--accent); }
        
        textarea { width: 100%; border: none; background: transparent; color: var(--text); resize: none; padding: 14px 50px 14px 16px; font-size: 1rem; max-height: 200px; outline: none; }
        textarea::placeholder { color: var(--placeholder); }
        
        .input-actions { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-top: 1px solid rgba(120,120,120,0.05); }
        .input-left-tools { display: flex; gap: 6px; }
        .send-btn { background: var(--accent); border: none; color: white; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
        .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

        /* Toggle Menu Button for Responsive Mobile Layout */
        .menu-toggle { display: none; }

        @media(max-width: 768px) {
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: flex; }
        }
    </style>
</head>
<body data-theme="midnight">

    <div class="sidebar" id="sidebar">
        <button class="new-chat-btn" onclick="startNewChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </button>
        <div class="history-list" id="historyList">
            </div>
        <div class="sidebar-footer">
            <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
                <option value="light">☀️ Light Pro</option>
                <option value="dark">🌙 Dark Fusion</option>
                <option value="midnight" selected>🌌 Midnight Mode</option>
            </select>
        </div>
    </div>

    <div class="main-chat">
        <div class="top-bar">
            <div class="chat-title">
                <button class="icon-btn menu-toggle" onclick="toggleSidebar()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <i class="fa-solid fa-layer-group" style="color: var(--accent)"></i>
                <span>NeuraChat Desktop</span>
            </div>
            <div class="top-actions">
                <button class="icon-btn" onclick="clearCurrentChat()" title="Clear Conversation">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message-row ai">
                <div class="message-center">
                    <div class="avatar"><i class="fa-solid fa-n"></i></div>
                    <div class="message-content">
                        <div class="message-meta">
                            <i class="fa-regular fa-calendar"></i> Wednesday, July 15, 2026
                        </div>
                        <div>Hello! I'm NeuraChat. How can I help you today?</div>
                        <div class="msg-tools">
                            <button class="tool-btn" onclick="speakText(this)"><i class="fa-solid fa-volume-high"></i> Speak</button>
                            <button class="tool-btn" onclick="copyText(this)"><i class="fa-regular fa-copy"></i> Copy</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="userInput" rows="1" placeholder="Type a message or use voice..." oninput="autoResizeTextarea(this)" onkeydown="handleKeyPress(event)"></textarea>
                <div class="input-actions">
                    <div class="input-left-tools">
                        <button class="icon-btn" id="voiceInputBtn" onclick="startVoiceRecognition()" title="Voice Typing">
                            <i class="fa-solid fa-microphone"></i>
                        </button>
                    </div>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'http://localhost:5000/api/chat'; // Change this to your live backend domain when ready
        let chatHistory = JSON.parse(localStorage.getItem('neuraChat_history')) || [];
        let currentChatId = localStorage.getItem('neuraChat_currentId') || null;

        // Auto-sizing input text field
        function autoResizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        // Change themes easily
        function changeTheme(themeName) {
            document.body.setAttribute('data-theme', themeName);
            localStorage.setItem('neuraChat_theme', themeName);
        }

        // Initialize theme settings on load
        const savedTheme = localStorage.getItem('neuraChat_theme') || 'midnight';
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById('themeSelect').value = savedTheme;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Core Text-To-Speech Feature (Speak Out Loud)
        function speakText(btnElement) {
            window.speechSynthesis.cancel(); 
            
            const textToSpeak = btnElement.closest('.message-content').querySelector('div:not(.message-meta):not(.msg-tools)').innerText;
            const utterance = new SpeechSynthesisUtterance(textToSpeak);
            
            const allVoices = window.speechSynthesis.getVoices();
            if(allVoices.length > 0) {
                utterance.voice = allVoices.find(v => v.name.includes('Google') || v.name.includes('Natural')) || allVoices[0];
            }
            
            window.speechSynthesis.speak(utterance);
        }

        // Core Speech-to-Text Recognition API (Microphone Typing Feature)
        function startVoiceRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Your desktop web browser doesn't completely support native Web Speech Voice Dictation. Please try using Google Chrome or Microsoft Edge.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            const micBtn = document.getElementById('voiceInputBtn');
            micBtn.style.color = 'var(--accent)';
            micBtn.innerHTML = '<i class="fa-solid fa-circle-dot fa-beat"></i>';

            recognition.start();

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                const inputField = document.getElementById('userInput');
                inputField.value = (inputField.value + " " + speechResult).trim();
                autoResizeTextarea(inputField);
            };

            recognition.onerror = (event) => {
                console.error("Desktop microphone setup error detected:", event.error);
                if(event.error === 'not-allowed') {
                    alert("Microphone permission denied! Click the Lock icon in your computer's browser address bar to switch the setting to 'Allow'.");
                }
            };

            recognition.onend = () => {
                micBtn.style.color = 'var(--text)';
                micBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            };
        }

        // Clipboard Copy Utility Helper
        function copyText(btnElement) {
            const txt = btnElement.closest('.message-content').querySelector('div:not(.message-meta):not(.msg-tools)').innerText;
            navigator.clipboard.writeText(txt).then(() => {
                const legacyLabel = btnElement.innerHTML;
                btnElement.innerHTML = '<i class="fa-solid fa-check"></i> Copied!';
                setTimeout(() => btnElement.innerHTML = legacyLabel, 2000);
            });
        }

        // Clear interface layout handler
        function clearCurrentChat() {
            document.getElementById('messagesContainer').innerHTML = '';
        }

        // Send pipeline data integration layer logic connecting to server backend system
        async function sendMessage() {
            const inputField = document.getElementById('userInput');
            const userText = inputField.value.trim();
            if(!userText) return;

            const container = document.getElementById('messagesContainer');
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            
            container.innerHTML += `
                <div class="message-row user">
                    <div class="message-center">
                        <div class="avatar">RO</div>
                        <div class="message-content">
                            <div class="message-meta"><i class="fa-regular fa-calendar"></i> ${today}</div>
                            <div>${userText}</div>
                        </div>
                    </div>
                </div>
            `;

            inputField.value = '';
            autoResizeTextarea(inputField);
            container.scrollTop = container.scrollHeight;

            const aiMessageId = 'ai-' + Date.now();
            container.innerHTML += `
                <div class="message-row ai" id="${aiMessageId}">
                    <div class="message-center">
                        <div class="avatar"><i class="fa-solid fa-n"></i></div>
                        <div class="message-content">
                            <div class="message-meta"><i class="fa-regular fa-calendar"></i> ${today}</div>
                            <div class="bot-text"><i class="fa-solid fa-circle-notch fa-spin"></i> NeuraChat is thinking...</div>
                            <div class="msg-tools" style="display:none;">
                                <button class="tool-btn" onclick="speakText(this)"><i class="fa-solid fa-volume-high"></i> Speak</button>
                                <button class="tool-btn" onclick="copyText(this)"><i class="fa-regular fa-copy"></i> Copy</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });
                
                const data = await response.json();
                const targetRow = document.getElementById(aiMessageId);
                
                targetRow.querySelector('.bot-text').innerText = data.reply || data.choices[0].message.content;
                targetRow.querySelector('.msg-tools').style.display = 'flex';
                
            } catch (err) {
                console.error("Backend request transmission breakdown:", err);
                const targetRow = document.getElementById(aiMessageId);
                targetRow.querySelector('.bot-text').innerText = "Network Error connection. Unable to connect to backend server configuration process.";
            }
            container.scrollTop = container.scrollHeight;
        }

        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
